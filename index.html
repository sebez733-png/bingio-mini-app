<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Adwa Bingo</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --card: #141c2e;
    --border: #243049;
    --fg: #e8edf5;
    --muted: #6b7a99;
    --accent: #f43f5e;
    --accent-glow: rgba(244, 63, 94, 0.4);
    --gold: #f59e0b;
    --gold-glow: rgba(245, 158, 11, 0.3);
    --green: #10b981;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(244, 63, 94, 0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(245, 158, 11, 0.06) 0%, transparent 50%);
    z-index: -1;
    pointer-events: none;
  }
  .app { max-width: 420px; margin: 0 auto; padding: 16px; }
  
  /* Typography */
  .font-display { font-family: 'Outfit', sans-serif; }
  .text-gold { color: var(--gold); }
  .text-accent { color: var(--accent); }
  .text-green { color: var(--green); }
  .text-muted { color: var(--muted); }

  /* Buttons */
  .btn {
    width: 100%; padding: 14px; border-radius: 14px; border: none;
    font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 16px;
    cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #be123c); color: white; box-shadow: 0 4px 20px var(--accent-glow); }
  .btn-gold { background: linear-gradient(135deg, var(--gold), #d97706); color: #1a1a1a; box-shadow: 0 4px 20px var(--gold-glow); }
  .btn-outline { background: transparent; color: var(--fg); border: 1.5px solid var(--border); }
  .btn-outline.active { border-color: var(--gold); color: var(--gold); background: rgba(245, 158, 11, 0.1); }
  
  /* Cards & Containers */
  .box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 12px; }

  /* Lobby Animations */
  .float-ball { animation: float 3s ease-in-out infinite; display: inline-block; }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  /* Game Grids */
  .bingo-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
  .bingo-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    background: #1a2236; border: 1px solid transparent; border-radius: 6px;
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 14px;
    transition: all 0.2s;
  }
  .bingo-cell.header { background: transparent; border: none; font-size: 16px; font-weight: 900; }
  .bingo-cell.header-b { color: var(--accent); }
  .bingo-cell.header-i { color: var(--gold); }
  .bingo-cell.header-n { color: var(--green); }
  .bingo-cell.header-g { color: #8b5cf6; }
  .bingo-cell.header-o { color: #06b6d4; }
  .bingo-cell.free { background: rgba(244, 63, 94, 0.1); color: var(--gold); font-size: 9px; border-color: var(--gold); }
  .bingo-cell.marked {
    background: linear-gradient(135deg, rgba(244,63,94,0.3), rgba(244,63,94,0.1));
    border-color: var(--accent); color: white; box-shadow: 0 0 8px var(--accent-glow);
  }
  .bingo-cell.winning { animation: winPulse 0.5s infinite alternate; border-color: var(--gold); box-shadow: 0 0 12px var(--gold-glow); background: rgba(245,158,11,0.3); }
  @keyframes winPulse { from { transform: scale(1); } to { transform: scale(1.1); } }

  /* Caller Display */
  .caller-display {
    background: linear-gradient(145deg, var(--card), #0f1629); border: 1px solid var(--border);
    border-radius: 20px; padding: 16px; text-align: center; margin-bottom: 12px; position: relative; overflow: hidden;
  }
  .caller-display::before { content:''; position: absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); }
  .called-num { font-size: 48px; font-weight: 900; line-height: 1; }
  .called-num.pop { animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes popIn { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* Screens */
  .screen { display: none; }
  .screen.active { display: block; }

  /* Win Overlay */
  .overlay { position: fixed; inset:0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 100; display: none; align-items: center; justify-content: center; }
  .overlay.active { display: flex; }
  .overlay-card { background: var(--card); border: 2px solid var(--gold); border-radius: 24px; padding: 32px; text-align: center; width: 90%; max-width: 320px; animation: popIn 0.4s ease; }
</style>
</head>
<body>

<div class="app">
  
  <!-- ========== LOBBY SCREEN ========== -->
  <div class="screen active" id="lobbyScreen">
    <div class="text-center mb-6 pt-8">
      <div class="text-4xl font-display font-black tracking-tight mb-2">
        <span class="text-accent float-ball" style="animation-delay:0s">B</span>
        <span class="text-gold float-ball" style="animation-delay:0.2s">I</span>
        <span class="text-green float-ball" style="animation-delay:0.4s">N</span>
        <span class="text-purple-400 float-ball" style="animation-delay:0.6s">G</span>
        <span class="text-cyan-400 float-ball" style="animation-delay:0.8s">O</span>
      </div>
      <p class="text-muted text-sm">Adwa Bingo Hall</p>
    </div>

    <div class="box text-center">
      <p class="text-muted text-xs uppercase tracking-widest mb-1">Next Game Prize Pool</p>
      <p class="text-gold font-display font-black text-4xl">100 ETB</p>
      <p class="text-muted text-sm mt-2">32 Players in Room</p>
    </div>

    <div class="box">
      <p class="font-bold mb-3 text-center">Select Number of Cards</p>
      <div class="flex gap-3">
        <button class="btn btn-outline active flex-1" id="btn1Card" onclick="selectCards(1)">1 Card<br><span class="text-gold text-xs">10 ETB</span></button>
        <button class="btn btn-outline flex-1" id="btn2Card" onclick="selectCards(2)">2 Cards<br><span class="text-gold text-xs">20 ETB</span></button>
      </div>
    </div>

    <button class="btn btn-primary text-lg" onclick="startGame()">
      🎲 Buy & Play Now
    </button>
  </div>

  <!-- ========== GAME SCREEN ========== -->
  <div class="screen" id="gameScreen">
    
    <!-- Top Caller -->
    <div class="caller-display">
      <div class="text-xs text-muted uppercase tracking-widest mb-1">Current Call</div>
      <div class="called-num font-display" id="callerNum">-</div>
      <div class="flex justify-around text-xs text-muted mt-3">
        <span>Called: <span class="text-fg font-bold" id="calledCount">0</span></span>
        <span>Left: <span class="text-fg font-bold" id="leftCount">75</span></span>
      </div>
    </div>

    <!-- Player Status -->
    <div class="flex gap-2 mb-3 text-center text-xs">
      <div class="box flex-1 py-2 mb-0"><span class="text-muted block">Cards</span><span class="font-bold text-gold" id="activeCards">1</span></div>
      <div class="box flex-1 py-2 mb-0"><span class="text-muted block">Lines</span><span class="font-bold text-green" id="linesFound">0</span></div>
      <div class="box flex-1 py-2 mb-0"><span class="text-muted block">Status</span><span class="font-bold text-accent" id="gameStatus">Playing</span></div>
    </div>

    <!-- Cards Container -->
    <div id="cardsContainer" class="flex flex-col gap-4 mb-4">
      <!-- Cards injected by JS -->
    </div>

    <!-- Controls -->
    <div class="flex gap-2">
      <button class="btn btn-gold flex-1" id="bingoBtn" onclick="claimBingo()" disabled>🏆 Claim BINGO</button>
    </div>

  </div>
</div>

<!-- Win Overlay -->
<div class="overlay" id="winOverlay">
  <div class="overlay-card">
    <div class="font-display font-black text-5xl text-gold mb-2">BINGO!</div>
    <p class="text-muted mb-6" id="winMsg">You won the prize!</p>
    <button class="btn btn-primary" onclick="backToLobby()">Play Again</button>
  </div>
</div>

<script>
  const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
  if (tg) { tg.ready(); tg.expand(); }

  let selectedCardCount = 1;
  let cards = [];
  let calledNumbers = [];
  let gameInterval = null;
  let gameOver = false;
  let totalLines = 0;
  let winningCells = [];

  const RANGES = [[1,15],[16,30],[31,45],[46,60],[61,75]];
  const LETTERS = ['B','I','N','G','O'];

  // --- Lobby Logic ---
  function selectCards(num) {
    selectedCardCount = num;
    document.getElementById('btn1Card').classList.toggle('active', num === 1);
    document.getElementById('btn2Card').classList.toggle('active', num === 2);
  }

  // --- Game Logic ---
  function startGame() {
    cards = [];
    calledNumbers = [];
    gameOver = false;
    totalLines = 0;
    winningCells = [];

    // Generate 1 or 2 cards with random IDs (1-400)
    for (let i = 0; i < selectedCardCount; i++) {
      const cardId = Math.floor(Math.random() * 400) + 1;
      const grid = generateGrid();
      const marked = Array(5).fill().map(() => Array(5).fill(false));
      marked[2][2] = true; // Free space
      cards.push({ id: cardId, grid, marked });
    }

    switchScreen('gameScreen');
    document.getElementById('activeCards').textContent = selectedCardCount;
    document.getElementById('linesFound').textContent = '0';
    document.getElementById('gameStatus').textContent = 'Playing';
    document.getElementById('bingoBtn').disabled = true;
    
    renderCards();
    startCaller();
  }

  function generateGrid() {
    const grid = [];
    for (let col = 0; col < 5; col++) {
      const [min, max] = RANGES[col];
      const pool = [];
      for (let n = min; n <= max; n++) pool.push(n);
      // Shuffle pool
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      grid.push(pool.slice(0, 5));
    }
    return grid;
  }

  function renderCards() {
    const container = document.getElementById('cardsContainer');
    container.innerHTML = '';

    cards.forEach((card, index) => {
      const cardEl = document.createElement('div');
      cardEl.className = 'box';
      
      let html = `<div class="flex justify-between items-center mb-2">
        <span class="text-xs text-muted uppercase tracking-widest">Card #${card.id}</span>
        <span class="text-xs text-gold font-bold">${index === 0 ? '10 ETB' : '20 ETB'} Bet</span>
      </div>`;

      html += `<div class="bingo-grid">`;
      // Headers
      LETTERS.forEach((l, i) => html += `<div class="bingo-cell header header-${l.toLowerCase()}">${l}</div>`);
      
      // Rows
      for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 5; col++) {
          const isFree = (row === 2 && col === 2);
          const isMarked = card.marked[col][row];
          const isWinning = winningCells.some(c => c.cardIdx === index && c.col === col && c.row === row);
          
          let classes = 'bingo-cell';
          if (isFree) classes += ' free marked';
          else if (isWinning) classes += ' winning marked';
          else if (isMarked) classes += ' marked';

          const text = isFree ? 'FREE' : card.grid[col][row];
          html += `<div class="${classes}">${text}</div>`;
        }
      }
      html += `</div>`;
      cardEl.innerHTML = html;
      container.appendChild(cardEl);
    });
  }

  function startCaller() {
    if (gameInterval) clearInterval(gameInterval);
    
    // Call first number immediately
    callNumber();
    
    // Then call every 3 seconds
    gameInterval = setInterval(() => {
      if (calledNumbers.length >= 75 || gameOver) {
        clearInterval(gameInterval);
        return;
      }
      callNumber();
    }, 3000);
  }

  function callNumber() {
    const available = [];
    for (let n = 1; n <= 75; n++) {
      if (!calledNumbers.includes(n)) available.push(n);
    }
    if (available.length === 0) return;

    const num = available[Math.floor(Math.random() * available.length)];
    calledNumbers.push(num);

    // Get letter
    let letterIdx = 0;
    for (let i = 0; i < RANGES.length; i++) {
      if (num >= RANGES[i][0] && num <= RANGES[i][1]) { letterIdx = i; break; }
    }
    const letter = LETTERS[letterIdx];

    // Update UI
    const display = document.getElementById('callerNum');
    display.innerHTML = `<span class="text-muted text-2xl">${letter}</span> ${num}`;
    display.classList.remove('pop');
    void display.offsetWidth;
    display.classList.add('pop');

    document.getElementById('calledCount').textContent = calledNumbers.length;
    document.getElementById('leftCount').textContent = 75 - calledNumbers.length;

    // Auto-Daub (Mark cards automatically)
    autoDaub(num);

    if (tg) tg.HapticFeedback.impactOccurred('light');
  }

  function autoDaub(calledNum) {
    let changed = false;
    cards.forEach((card, idx) => {
      for (let col = 0; col < 5; col++) {
        for (let row = 0; row < 5; row++) {
          if (row === 2 && col === 2) continue;
          if (card.grid[col][row] === calledNum && !card.marked[col][row]) {
            card.marked[col][row] = true;
            changed = true;
          }
        }
      }
    });
    if (changed) {
      renderCards();
      checkAllBingos();
    }
  }

  function checkAllBingos() {
    let currentRoundLines = 0;
    winningCells = []; // Reset visual winning cells

    cards.forEach((card, cardIdx) => {
      // Check Rows
      for (let row = 0; row < 5; row++) {
        let complete = true;
        let lineCells = [];
        for (let col = 0; col < 5; col++) {
          if (!card.marked[col][row]) { complete = false; break; }
          lineCells.push({cardIdx, col, row});
        }
        if (complete) { currentRoundLines++; winningCells.push(...lineCells); }
      }
      // Check Cols
      for (let col = 0; col < 5; col++) {
        let complete = true;
        let lineCells = [];
        for (let row = 0; row < 5; row++) {
          if (!card.marked[col][row]) { complete = false; break; }
          lineCells.push({cardIdx, col, row});
        }
        if (complete) { currentRoundLines++; winningCells.push(...lineCells); }
      }
      // Diag 1
      let d1 = true, d1c = [];
      for (let i = 0; i < 5; i++) { if (!card.marked[i][i]) { d1 = false; break; } d1c.push({cardIdx, col:i, row:i}); }
      if (d1) { currentRoundLines++; winningCells.push(...d1c); }
      // Diag 2
      let d2 = true, d2c = [];
      for (let i = 0; i < 5; i++) { if (!card.marked[4-i][i]) { d2 = false; break; } d2c.push({cardIdx, col:4-i, row:i}); }
      if (d2) { currentRoundLines++; winningCells.push(...d2c); }
    });

    if (currentRoundLines > totalLines) {
      totalLines = currentRoundLines;
      document.getElementById('linesFound').textContent = totalLines;
      document.getElementById('bingoBtn').disabled = false;
      
      // Re-render to show winning cells glowing
      renderCards(); 
    }
  }

  function claimBingo() {
    if (totalLines === 0 || gameOver) return;
    gameOver = true;
    clearInterval(gameInterval);

    document.getElementById('gameStatus').textContent = 'Won!';
    document.getElementById('bingoBtn').disabled = true;

    // Show overlay
    document.getElementById('winOverlay').classList.add('active');
    document.getElementById('winMsg').textContent = `You hit BINGO with ${totalLines} line(s) on your cards!`;

    if (tg) {
      tg.HapticFeedback.notificationOccurred('success');
      // Send structured data back to Python bot
      const winData = {
        action: 'bingo_win',
        lines: totalLines,
        cards_played: selectedCardCount,
        card_ids: cards.map(c => c.id)
      };
      tg.sendData(JSON.stringify(winData));
    }
  }

  function backToLobby() {
    document.getElementById('winOverlay').classList.remove('active');
    switchScreen('lobbyScreen');
  }

  function switchScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
</script>
</body>
</html>
